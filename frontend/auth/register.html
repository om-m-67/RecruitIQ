<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | RecruitIQ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <div class="auth-container">

        <div class="auth-left">

            <div class="branding">

                <h1>Join RecruitIQ</h1>

                <h2>Build The Future Of Hiring</h2>

                <p>
                    Create your account and start managing recruitment,
                    hiring pipelines, applications and AI-powered screening.
                </p>

            </div>

        </div>

        <div class="auth-right">

            <div class="auth-card register-card">

                <h2>Create Account</h2>

                <p>Start your recruitment journey today.</p>

                <form>

                    <div class="role-selection">

                        <label class="role-card">

                            <input type="radio" name="role" checked>

                            <span>👨‍🎓 Candidate</span>

                        </label>

                        <label class="role-card">

                            <input type="radio" name="role">

                            <span>👨‍💼 Recruiter</span>

                        </label>

                    </div>

                    <div class="form-grid">

                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" placeholder="John">
                        </div>

                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" placeholder="Doe">
                        </div>

                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" placeholder="+91 XXXXX XXXXX">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword">
                    </div>

                    <div class="password-strength">

                        <div class="strength-bar"></div>

                        <small>Strong Password</small>

                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password">
                    </div>

                    <label class="terms-check">

                        <input type="checkbox">

                        I agree to the Terms & Conditions and Privacy Policy

                    </label>

                    <button class="auth-btn">
                        Create Account
                    </button>

                </form>

                <p class="auth-footer">

                    Already have an account?

                    <a href="login.html">
                        Login
                    </a>

                </p>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
