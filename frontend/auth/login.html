<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | RecruitIQ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <div class="auth-container">

        <!-- Left Branding -->

        <div class="auth-left">

            <div class="branding">

                <h1>RecruitIQ</h1>

                <h2>AI-Powered Recruitment Platform</h2>

                <p>
                    Simplify hiring with ATS management,
                    AI screening, analytics and recruitment automation.
                </p>

                <div class="auth-stats">

                    <div>
                        <h3>10K+</h3>
                        <span>Candidates</span>
                    </div>

                    <div>
                        <h3>500+</h3>
                        <span>Companies</span>
                    </div>

                    <div>
                        <h3>95%</h3>
                        <span>Success Rate</span>
                    </div>

                </div>

            </div>

        </div>

        <!-- Right Form -->

        <div class="auth-right">

            <div class="auth-card">

                <h2>Welcome Back</h2>

                <p>
                    Login to continue using RecruitIQ
                </p>

                <form>

                    <div class="form-group">

                        <label>Email Address</label>

                        <input type="email" placeholder="Enter your email">

                    </div>

                    <div class="form-group">

                        <label>Password</label>

                        <div class="password-wrapper">

                            <input type="password" id="password" placeholder="Enter password">

                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                👁
                            </button>

                        </div>

                    </div>

                    <div class="auth-options">

                        <label>

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="forgot-password.html">
                            Forgot Password?
                        </a>

                    </div>

                    <button class="auth-btn">

                        Login

                    </button>

                </form>

                <div class="divider">

                    <span>OR</span>

                </div>

                <div class="social-login">

                    <button class="google-btn">

                        Google

                    </button>

                    <button class="linkedin-btn">

                        LinkedIn

                    </button>

                </div>

                <p class="auth-footer">

                    Don't have an account?

                    <a href="register.html">
                        Register
                    </a>

                </p>

            </div>

        </div>

    </div>

    <script>

        function togglePassword() {

            const password =
                document.getElementById("password");

            if (password.type === "password") {
                password.type = "text";
            }
            else {
                password.type = "password";
            }

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
