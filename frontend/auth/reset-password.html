<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password | RecruitIQ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <div class="auth-center-container">

        <div class="forgot-card">

            <div class="forgot-icon">
                🔒
            </div>

            <h1>Create New Password</h1>

            <p>
                Choose a strong password to secure your account.
            </p>

            <form>

                <div class="form-group">

                    <label>New Password</label>

                    <div class="password-wrapper">

                        <input type="password" id="newPassword" placeholder="Enter new password">

                        <button type="button" class="toggle-password" onclick="toggleNewPassword()">
                            👁
                        </button>

                    </div>

                </div>

                <div class="password-strength">

                    <div class="strength-bar"></div>

                    <small>Strong Password</small>

                </div>

                <div class="form-group">

                    <label>Confirm Password</label>

                    <div class="password-wrapper">

                        <input type="password" id="confirmPassword" placeholder="Confirm password">

                        <button type="button" class="toggle-password" onclick="toggleConfirmPassword()">
                            👁
                        </button>

                    </div>

                </div>

                <button class="auth-btn">

                    Reset Password

                </button>

            </form>

            <div class="reset-success">

                <span>✅</span>

                Password successfully updated.

            </div>

            <div class="back-login">

                <a href="login.html">

                    Go To Login →

                </a>

            </div>

        </div>

    </div>

    <script>

        function toggleNewPassword() {

            const password =
                document.getElementById("newPassword");

            password.type =
                password.type === "password"
                    ? "text"
                    : "password";

        }

        function toggleConfirmPassword() {

            const password =
                document.getElementById("confirmPassword");

            password.type =
                password.type === "password"
                    ? "text"
                    : "password";

        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
