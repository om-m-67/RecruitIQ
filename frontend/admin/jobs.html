<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jobs Management | RecruitIQ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <div class="dashboard-layout">

        <aside class="sidebar">

            <div class="sidebar-header">
                <h2>RecruitIQ</h2>
            </div>

            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="users.html">👥 Users</a></li>
                <li><a class="active" href="#">💼 Jobs</a></li>
                <li><a href="companies.html">🏢 Companies</a></li>
                <li><a href="analytics.html">📈 Analytics</a></li>
                <li><a href="settings.html">⚙ Settings</a></li>
            </ul>

        </aside>

        <main class="main-content">

            <nav class="navbar">
                <div class="logo">Jobs Management</div>
            </nav>

            <div class="page-header">

                <h2>Manage Jobs</h2>

                <button class="primary-btn">
                    + Create Job
                </button>

            </div>

            <div class="dashboard-card">

                <div class="table-toolbar">

                    <input type="text" placeholder="Search jobs..." class="table-search">

                    <select class="table-filter">
                        <option>All Status</option>
                        <option>Open</option>
                        <option>Closed</option>
                    </select>

                </div>

                <table class="admin-table">

                    <thead>

                        <tr>
                            <th>Job Title</th>
                            <th>Company</th>
                            <th>Applicants</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>

                    </thead>

                    <tbody>

                        <tr>
                            <td>Frontend Developer</td>
                            <td>TechNova</td>
                            <td>42</td>
                            <td>
                                <span class="status open-status">
                                    Open
                                </span>
                            </td>
                            <td>
                                <button class="action-btn">
                                    Manage
                                </button>
                            </td>
                        </tr>

                        <tr>
                            <td>Backend Engineer</td>
                            <td>CloudSoft</td>
                            <td>25</td>
                            <td>
                                <span class="status open-status">
                                    Open
                                </span>
                            </td>
                            <td>
                                <button class="action-btn">
                                    Manage
                                </button>
                            </td>
                        </tr>

                        <tr>
                            <td>UI/UX Designer</td>
                            <td>DesignHub</td>
                            <td>18</td>
                            <td>
                                <span class="status closed-status">
                                    Closed
                                </span>
                            </td>
                            <td>
                                <button class="action-btn">
                                    Manage
                                </button>
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
