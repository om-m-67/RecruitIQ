<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Settings | RecruitIQ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <div class="dashboard-layout">

        <aside class="sidebar">

            <div class="sidebar-header">
                <h2>RecruitIQ</h2>
            </div>

            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="users.html">👥 Users</a></li>
                <li><a href="jobs.html">💼 Jobs</a></li>
                <li><a href="companies.html">🏢 Companies</a></li>
                <li><a href="analytics.html">📈 Analytics</a></li>
                <li><a class="active" href="#">⚙ Settings</a></li>
            </ul>

        </aside>

        <main class="main-content">

            <nav class="navbar">
                <div class="logo">Platform Settings</div>
            </nav>

            <div class="settings-grid">

                <!-- Profile -->

                <div class="dashboard-card">

                    <h3>Admin Profile</h3>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" value="System Administrator">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" value="admin@recruitiq.com">
                    </div>

                    <button class="primary-btn">
                        Save Profile
                    </button>

                </div>

                <!-- Platform -->

                <div class="dashboard-card">

                    <h3>Platform Configuration</h3>

                    <div class="form-group">
                        <label>Platform Name</label>
                        <input type="text" value="RecruitIQ">
                    </div>

                    <div class="form-group">
                        <label>Support Email</label>
                        <input type="email" value="support@recruitiq.com">
                    </div>

                    <button class="primary-btn">
                        Save Configuration
                    </button>

                </div>

                <!-- Email -->

                <div class="dashboard-card">

                    <h3>Email Settings</h3>

                    <div class="form-group">
                        <label>SMTP Host</label>
                        <input type="text" placeholder="smtp.example.com">
                    </div>

                    <div class="form-group">
                        <label>SMTP Port</label>
                        <input type="text" placeholder="587">
                    </div>

                    <button class="primary-btn">
                        Update Email Settings
                    </button>

                </div>

                <!-- Security -->

                <div class="dashboard-card">

                    <h3>Security Settings</h3>

                    <label class="switch-row">
                        <span>Two Factor Authentication</span>
                        <input type="checkbox" checked>
                    </label>

                    <label class="switch-row">
                        <span>Login Alerts</span>
                        <input type="checkbox" checked>
                    </label>

                    <label class="switch-row">
                        <span>Password Expiry Policy</span>
                        <input type="checkbox">
                    </label>

                </div>

                <!-- Notifications -->

                <div class="dashboard-card">

                    <h3>Notification Preferences</h3>

                    <label class="switch-row">
                        <span>Email Notifications</span>
                        <input type="checkbox" checked>
                    </label>

                    <label class="switch-row">
                        <span>Recruiter Alerts</span>
                        <input type="checkbox" checked>
                    </label>

                    <label class="switch-row">
                        <span>Weekly Reports</span>
                        <input type="checkbox">
                    </label>

                </div>

                <!-- Appearance -->

                <div class="dashboard-card">

                    <h3>Appearance</h3>

                    <label class="switch-row">
                        <span>Dark Mode</span>
                        <input type="checkbox">
                    </label>

                    <label class="switch-row">
                        <span>Compact Layout</span>
                        <input type="checkbox">
                    </label>

                </div>

            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
