<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RecruitIQ Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/recruiter.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <div class="sidebar">

        <div class="logo">
            RecruitIQ
        </div>

        <ul class="menu">
            <li>Dashboard</li>
            <li>Jobs</li>
            <li>Candidates</li>
            <li>Pipeline</li>
            <li>Interviews</li>
            <li>Analytics</li>
            <li>Settings</li>
        </ul>

    </div>

    <div class="navbar">

        <input class="search-box" type="text" placeholder="Search candidates...">

        <div>
            🔔 &nbsp;&nbsp; 👤
        </div>

    </div>

    <main class="page-content">

        <h1>Recruiter Dashboard</h1>

        <div class="cards">

            <div class="stat-card">
                <h4>Active Jobs</h4>
                <h2>12</h2>
            </div>

            <div class="stat-card">
                <h4>Applicants</h4>
                <h2>245</h2>
            </div>

            <div class="stat-card">
                <h4>Interviews</h4>
                <h2>34</h2>
            </div>

            <div class="stat-card">
                <h4>Hires</h4>
                <h2>8</h2>
            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
